<!DOCTYPE html>
<html lang="cz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0" />
    <title>Průchod skenem kroje</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      #screen {
        height: 100dvh;
        width: 100vw;
        padding: 30px;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: rgb(36, 100, 18);
      }
      @media (max-width: 768px) {
        #screen{
          padding: 0px;
        }
      }

      #tutorialWindow{
        position: relative; 
        padding: 30px;
        height: 80%;
        width: 70%;
        background-color: rgba(25, 67, 13, 1);
        border-radius: 15px;
      }
      @media (max-width: 768px) {
        #tutorialWindow{
          width: 100%;
          height: 100%;
          border-radius: 0px;
        }
      }
      #tutorialContainer{   
        height: 90%;
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 3fr;
        grid-gap: 30px 30px;
      }
      @media (max-width: 768px) {
        #tutorialContainer{
          grid-template-columns: 1fr;
          grid-template-rows: 1fr 1fr;
          padding-top: 20px;
        }
      }
      .column{
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: relative;
      }
      .textContainer{
        position: relative;
        width: 100%;
        height: 100%;
        overflow-y: scroll;
        scrollbar-width: none;
      }
      #title{
        height: fit-content;
        width: 100%;
        border-radius: 10px;
        padding-top: 20px;
        padding-bottom: 20px;
        color: #ffffff;
        font-family: "DM Sans", sans-serif;
        font-size: 28px;
      }
      @media (max-width: 768px) {
        #title{
          padding-top: 0px;
        }
      }
      #description{
        height: fit-content;
        width: 100%;
        border-radius: 10px;
        padding-top: 20px;
        padding-bottom: 20px;
        margin-bottom: 40px;
        color: #ffffff;
        font-family: "DM Sans", sans-serif;
        font-size: 22px;
      }
      a:link{
        text-decoration: none;
        color: rgb(139, 255, 31);
      }
      a:visited {
        color: rgb(139, 255, 31);
        text-decoration: none;
      }
      a:hover {
        color: rgb(55, 255, 0);
        text-decoration: none;
      }
      .gradient{
        content: '';
        position: absolute;
        left: 0px;
        right: 0px;
        bottom: 0px;
        height: 20%;
        width: 100%;
        background: linear-gradient(180deg, rgba(25, 67, 13, 0) 0%, rgba(25, 67, 13, 0.7) 50%, rgba(25, 67, 13, 1) 100%);
        pointer-events: none;
      }
      #imageFrame{
        height: 100%;
        width: 100%;
        border-radius: 15px;
        overflow: hidden;
      }
      .image{
        height: 100%;
        position: relative;
        left: 50%;
        transform: translate(-50%, 0%);
        object-fit: cover;
        border-radius: 15px;
      }
      .bottomButtonContainer{
        width: 100%;
        height: 80px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-gap: 20px 20px;
        padding-top: 30px;
      }
      .bottomButton{
        width: 100px;
        height: 50px;
        border-radius: 10px;
        margin: auto;
        border: none;
        background-color:rgba(0, 0, 0, 0.3);
        color: #ffffff;
        font-family: "DM Sans", sans-serif;
        font-size: 20px;
      }
      @media (max-width: 768px) {
        .bottomButton{
          width: 80px;
          height: 40px;
        }
      }
      #exit{
        position: fixed;
        right: 30px;
        top: 30px;
        background-color: rgba(0, 0, 0, 0.5);
        color: red;
      }
      @media (max-width: 768px) {
        #exit{
          right: 10px;
          top: 10px;
        }
      }
      
    </style>
    <script type="module" crossorigin src="/costumePresentationAppDemo/assets/tutorial-BO9pcRHt.js"></script>
    <link rel="modulepreload" crossorigin href="/costumePresentationAppDemo/assets/modulepreload-polyfill-wMinxHhO.js">
  </head>
  <body>
    <div id="screen">
      <div id="tutorialWindow">
        <div id="tutorialContainer">
          <div class="column">
            <div class="textContainer ">
              <div id="title" ></div>
              <div id="description" ></div>
            </div>
            <div class="gradient" ></div>
          </div>
          <div class="column">
            <div id="imageFrame"></div>
          </div>
        </div>

        <div class="bottomButtonContainer">
          <img id="previous" class="bottomButton" src="./icons/prev.svg" alt="Předchozí"></img>
          <img id="next" class="bottomButton" src="./icons/next.svg" alt="Další" wi></img>
        </div>
      </div>

      <a href="/costumePresentationAppDemo/index.html">
        <button id="exit" class="bottomButton" type="button">Odejít</button>
      </a>
    </div>

  </body>
</html>
